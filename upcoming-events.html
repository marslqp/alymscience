<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events | AlymChems</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #020617; color: white; padding: 70px 50px 50px; }
        .topnav { position:fixed;top:0;left:0;right:0;padding:12px 24px;background:rgba(2,6,23,0.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;justify-content:space-between;align-items:center;z-index:100; }
        .back-btn { color:#38bdf8;text-decoration:none;font-weight:700;font-size:14px;background:rgba(56,189,248,0.1);padding:6px 14px;border-radius:8px;border:1px solid rgba(56,189,248,0.2); }
        .lang-row { display:flex;gap:6px; }
        .lbtn { background:none;border:2px solid transparent;border-radius:6px;padding:4px 10px;cursor:pointer;font-size:12px;font-weight:700;font-family:inherit;color:#94a3b8;letter-spacing:0.5px;transition:0.2s; }
        .lbtn.active { border-color:#38bdf8;color:#38bdf8; }
        h1 { text-align:center;margin-bottom:30px;font-size:28px;background:linear-gradient(135deg,#38bdf8,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent; }
        .event-card { background: rgba(255,255,255,0.05); margin: 20px auto; padding: 20px; border-radius: 15px; max-width: 800px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid #2563eb; }
        .date { background: #2563eb; padding: 10px; border-radius: 8px; font-weight: bold; min-width: 100px; text-align: center; }
        .info { flex-grow: 1; margin-left: 20px; }
        h2 { color: #38bdf8; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="topnav">
  <a href="index.html" class="back-btn" id="ev-home">← Home</a>
  <div class="lang-row">
    <button class="lbtn" id="ev-btn-ru" onclick="evSetLang('ru')">RU</button>
    <button class="lbtn active" id="ev-btn-en" onclick="evSetLang('en')">ENG</button>
  </div>
</div>

<h1 id="ev-title">Upcoming Events & Competitions</h1>

<div class="event-card">
    <div class="date">OCT 15<br>2026</div>
    <div class="info">
        <h2 id="ev1-title">National Chemistry Olympiad</h2>
        <p id="ev1-desc">Location: Main Hall | Time: 09:00 AM</p>
    </div>
</div>

<div class="event-card">
    <div class="date">NOV 05<br>2026</div>
    <div class="info">
        <h2 id="ev2-title">School Science Fair</h2>
        <p id="ev2-desc">Topic: Green Energy Reactions | All grades welcome.</p>
    </div>
</div>

<div class="event-card">
    <div class="date">DEC 12<br>2026</div>
    <div class="info">
        <h2 id="ev3-title">Winter Lab Workshop</h2>
        <p id="ev3-desc">Hands-on session with liquid nitrogen and cryo-reactions.</p>
    </div>
</div>

<script>
const EV_T = {
  ru: {
    home:'← Главная',
    title:'Предстоящие события и олимпиады',
    'ev1-title':'Национальная олимпиада по химии',
    'ev1-desc':'Место: Главный зал | Время: 09:00',
    'ev2-title':'Школьная ярмарка науки',
    'ev2-desc':'Тема: Реакции зелёной энергии | Приглашаются все классы.',
    'ev3-title':'Зимний практикум в лаборатории',
    'ev3-desc':'Практическое занятие с жидким азотом и крио-реакциями.',
  },
  en: {
    home:'← Home',
    title:'Upcoming Events & Competitions',
    'ev1-title':'National Chemistry Olympiad',
    'ev1-desc':'Location: Main Hall | Time: 09:00 AM',
    'ev2-title':'School Science Fair',
    'ev2-desc':'Topic: Green Energy Reactions | All grades welcome.',
    'ev3-title':'Winter Lab Workshop',
    'ev3-desc':'Hands-on session with liquid nitrogen and cryo-reactions.',
  }
};
function evSetLang(lang) {
  localStorage.setItem('alymLang', lang);
  const ru = document.getElementById('ev-btn-ru');
  const en = document.getElementById('ev-btn-en');
  ru.classList.toggle('active', lang==='ru');
  en.classList.toggle('active', lang==='en');
  const t = EV_T[lang];
  for(const [id, val] of Object.entries(t)) {
    const el = document.getElementById(id);
    if(el) el.textContent = val;
  }
}
document.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('alymLang') || 'en';
  evSetLang(saved);
});
</script>
</body>
</html>
