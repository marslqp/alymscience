<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль | AlymChems</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: "Poppins", sans-serif; background: #020617; color: white; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 40px 20px; }
        .profile-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 30px; position: relative; overflow: hidden; }
        .role-badge { position: absolute; top: 20px; right: 20px; padding: 5px 15px; border-radius: 20px; font-size: 12px; font-weight: 700; text-transform: uppercase; }
        .student-badge { background: #2563eb; color: white; }
        .teacher-badge { background: #f59e0b; color: white; }
        
        .user-info h1 { font-size: 28px; margin-bottom: 5px; }
        .user-info p { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .stat-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.05); text-align: center; }
        .stat-val { font-size: 32px; font-weight: 800; color: #ef4444; display: block; }
        .stat-label { font-size: 12px; color: #64748b; }

        .section-title { font-size: 18px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .btn { display: inline-block; padding: 12px 24px; border-radius: 12px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; text-decoration: none; transition: 0.3s; }
        .btn-logout { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .btn-logout:hover { background: #ef4444; color: white; }
        
        #teacher-panel, #student-panel { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="profile-card" id="profile-content">
        <div id="role-tag" class="role-badge">Загрузка...</div>
        
        <div class="user-info">
            <h1 id="user-name">...</h1>
            <p id="user-subtext">Загрузка данных профиля...</p>
        </div>

        <div class="stats-grid">
            <div class="stat-box">
                <span class="stat-val" id="main-stat">—</span>
                <span class="stat-label" id="main-label">Очки</span>
            </div>
            <div class="stat-box">
                <span class="stat-val" id="secondary-stat">—</span>
                <span class="stat-label" id="secondary-label">Класс</span>
            </div>
        </div>

        <div id="student-panel">
            <h2 class="section-title">🏆 Твои последние результаты</h2>
            <div id="scores-list"></div>
        </div>

        <div id="teacher-panel">
            <h2 class="section-title">📚 Ваши активные классы</h2>
            <div id="classes-list"></div>
            <a href="teacher.html" class="btn" style="background:#2563eb; color:white; margin-top:10px; width:100%; text-align:center;">Управление классами</a>
        </div>

        <div style="margin-top: 30px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; display: flex; justify-content: space-between; align-items: center;">
            <a href="index.html" style="color: #64748b; text-decoration: none; font-size: 14px;">← Вернуться на главную</a>
            <button class="btn btn-logout" onclick="logout()">Выйти из системы</button>
        </div>
    </div>
</div>

<script>
    function initProfile() {
        // Ищем именно тот ключ, который у тебя в консоли — currentUser
        const rawData = localStorage.getItem('currentUser');
        let userData = null;

        try {
            userData = JSON.parse(rawData);
        } catch (e) {
            console.error("Ошибка чтения currentUser");
        }

        const nameH1 = document.getElementById('user-name');
        const subtext = document.getElementById('user-subtext');
        const roleTag = document.getElementById('role-tag');

        if (!userData) {
            console.log("Данные currentUser не найдены");
            window.location.href = 'login.html';
            return;
        }

        // Заполняем данные, используя ТВОИ ключи (name вместо fullname)
        nameH1.textContent = userData.name || "Пользователь";
        
        // Проверяем роль (если в данных есть role, иначе по умолчанию student)
        const role = userData.role || 'student';

        if (role === 'teacher') {
            roleTag.textContent = 'Учитель';
            roleTag.className = 'role-badge teacher-badge';
            subtext.textContent = 'Преподаватель лицей Алымбек Датка';
            document.getElementById('main-label').textContent = 'Предмет';
            document.getElementById('main-stat').textContent = userData.subject || 'Химия';
            document.getElementById('secondary-label').textContent = 'Статус';
            document.getElementById('secondary-stat').textContent = 'PRO';
            document.getElementById('teacher-panel').style.display = 'block';
        } else {
            roleTag.textContent = 'Ученик';
            roleTag.className = 'role-badge student-badge';
            subtext.textContent = 'Ученик лицей Алымбек Датка';
            // Используем userData.score или 0, и userData.grade
            document.getElementById('main-stat').textContent = userData.score || 0;
            document.getElementById('secondary-stat').textContent = userData.grade || '9А';
            document.getElementById('student-panel').style.display = 'block';
        }
    }

    function logout() {
        // Очищаем именно currentUser
        localStorage.removeItem('currentUser');
        window.location.href = 'login.html';
    }

    document.addEventListener('DOMContentLoaded', initProfile);
</script>
    
</body>
</html>
